<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<style>
body {
    font-family: Arial;
    background:#e6e6e6;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box {
    background:#d9d9d9;
    padding:30px;
    border-radius:10px;
    width:300px;
    text-align:center;
}
input {
    width:90%;
    padding:10px;
    margin:10px;
}
button {
    width:100%;
    padding:10px;
    background:green;
    color:white;
    border:none;
}
</style>
</head>

<body>

<div class="box">
<h2>Signup</h2>

<input id="newUser" placeholder="Create Username">
<input id="newPass" type="password" placeholder="Create Password">

<button onclick="signup()">Create Account</button>

<p id="msg"></p>
</div>

<script>
function signup(){
    let u = document.getElementById("newUser").value;
    let p = document.getElementById("newPass").value;

    localStorage.setItem("user", u);
    localStorage.setItem("pass", p);

    document.getElementById("msg").innerText="Account Created!";
    
    setTimeout(()=>{
        window.location.href="login.html";
    },1000);
}
</script>

</body>
</html>
