<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<style>
body{font-family:Arial;background:#e6e6e6;text-align:center;}
.box{background:white;padding:30px;margin:100px auto;width:300px;border-radius:10px;}
input{padding:10px;margin:10px;width:90%;}
button{padding:10px;width:100%;background:green;color:white;border:none;}
</style>
</head>
<body>

<div class="box">
<h2>Signup</h2>
<input id="newUser" placeholder="Username">
<input id="newPass" type="password" placeholder="Password">
<button onclick="signup()">Create Account</button>
<p id="msg"></p>
</div>

<script>
function signup(){
    let u=document.getElementById("newUser").value;
    let p=document.getElementById("newPass").value;

    localStorage.setItem("user",u);
    localStorage.setItem("pass",p);

    document.getElementById("msg").innerText="Account Created!";
    setTimeout(()=>{window.location.href="login.html";},1000);
}
</script>

</body>
</html>
</script>

</body>
</html>
