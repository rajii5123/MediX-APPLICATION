<!DOCTYPE html>
<html>
<head>
<title>AI Disease Detection</title>

<style>
body{font-family:Arial;background:#e6e6e6;text-align:center;}
.box{background:white;padding:30px;margin:50px auto;width:350px;border-radius:10px;}
img{width:200px;margin-top:10px;}
button{padding:10px;margin:10px;background:green;color:white;border:none;width:90%;}
</style>
</head>

<body>

<div class="box">

<h2 id="welcome"></h2>

<button onclick="setMode('animal')">Animal Detection</button>
<button onclick="setMode('plant')">Plant Detection</button>

<hr>

<input type="file" id="image" onchange="previewImage()"><br>
<img id="preview">

<button onclick="detect()">Detect Disease</button>

<h3 id="result"></h3>
<p id="treatment"></p>

<button onclick="logout()">Logout</button>

</div>

<script>

// LOGIN CHECK
if(localStorage.getItem("loggedIn")!=="true"){
    window.location.href="login.html";
}

// USERNAME
document.getElementById("welcome").innerText="Welcome, "+localStorage.getItem("user");

// MODE
let mode="plant";

function setMode(type){
    mode=type;
    alert(type+" mode selected");
}

// IMAGE PREVIEW
function previewImage(){
    let file=document.getElementById("image").files[0];
    let reader=new FileReader();
    reader.onload=function(){
        document.getElementById("preview").src=reader.result;
    }
    reader.readAsDataURL(file);
}

// DETECT
function detect(){

    if(mode==="plant"){
        let d=["Leaf Spot","Powdery Mildew","Healthy"];
        let t=["Use fungicide","Apply pesticide","No treatment"];

        let i=Math.floor(Math.random()*3);

        document.getElementById("result").innerText="Plant: "+d[i];
        document.getElementById("treatment").innerText="Treatment: "+t[i];
    }

    if(mode==="animal"){
        let d=["Skin Infection","Foot & Mouth","Healthy"];
        let t=["Apply cream","Vaccinate","No treatment"];

        let i=Math.floor(Math.random()*3);

        document.getElementById("result").innerText="Animal: "+d[i];
        document.getElementById("treatment").innerText="Treatment: "+t[i];
    }
}

// LOGOUT
function logout(){
    localStorage.removeItem("loggedIn");
    window.location.href="login.html";
}

</script>

</body>
</html>
