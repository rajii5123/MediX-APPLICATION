<!DOCTYPE html>
<html>
<head>
    <title>AI Disease Detection</title>

    <style>
        body {
            font-family: Arial;
            background: #e6e6e6;
            text-align: center;
        }

        .box {
            background: white;
            padding: 30px;
            margin: 50px auto;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        img {
            width: 200px;
            margin-top: 10px;
        }

        button {
            padding: 10px;
            margin: 10px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            width: 90%;
        }
    </style>
</head>

<body>

<div class="box">

    <h2 id="welcome"></h2>

    <h3>Select Feature</h3>

    <button onclick="setMode('animal')">Animal Detection</button>
    <button onclick="setMode('plant')">Plant Detection</button>

    <hr>

    <input type="file" id="image" onchange="previewImage()"><br>
    <img id="preview">

    <button onclick="detect()">Detect Disease</button>

    <h3 id="result"></h3>
    <p id="treatment"></p>

    <button onclick="logout()">Logout</button>

</div>

<script>

// 🔐 LOGIN CHECK
if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "login.html";
}

// 👤 USERNAME
let user = localStorage.getItem("user");
document.getElementById("welcome").innerText = "Welcome, " + user;

// 🎯 MODE (animal / plant)
let mode = "plant";

function setMode(type){
    mode = type;
    alert(type.toUpperCase() + " mode selected");
}

// 📷 IMAGE PREVIEW
function previewImage(){
    let file = document.getElementById("image").files[0];
    let reader = new FileReader();
    reader.onload = function(){
        document.getElementById("preview").src = reader.result;
    }
    reader.readAsDataURL(file);
}

// 🤖 DETECTION + TREATMENT
function detect(){

    if(mode === "plant"){
        let diseases = ["Leaf Spot", "Powdery Mildew", "Healthy"];
        let treatments = [
            "Use fungicide spray",
            "Apply pesticide",
            "No treatment needed"
        ];

        let i = Math.floor(Math.random()*3);

        document.getElementById("result").innerText = "Plant Disease: " + diseases[i];
        document.getElementById("treatment").innerText = "Treatment: " + treatments[i];
    }

    if(mode === "animal"){
        let diseases = ["Skin Infection", "Foot & Mouth", "Healthy"];
        let treatments = [
            "Apply antiseptic cream",
            "Vaccinate immediately",
            "No treatment needed"
        ];

        let i = Math.floor(Math.random()*3);

        document.getElementById("result").innerText = "Animal Disease: " + diseases[i];
        document.getElementById("treatment").innerText = "Treatment: " + treatments[i];
    }
}

// 🔓 LOGOUT
function logout(){
    localStorage.removeItem("loggedIn");
    window.location.href = "login.html";
}

</script>

</body>
</html>
