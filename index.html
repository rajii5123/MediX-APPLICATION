<!DOCTYPE html>
<html>
<head>
    <title>AI Disease Detection Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #e6e6e6;
            margin: 0;
        }

        header {
            background: #0072ff;
            color: white;
            padding: 15px;
            text-align: center;
            position: relative;
        }

        .logout {
            position: absolute;
            right: 20px;
            top: 15px;
            background: red;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
        }

        .welcome {
            margin-top: 10px;
            font-size: 18px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px gray;
            cursor: pointer;
        }

        .card:hover {
            background: #f0f8ff;
        }

        button {
            margin-top: 10px;
            padding: 8px;
            background: #0072ff;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<header>
    <h2>AI Health & Agriculture Dashboard</h2>
    <div class="welcome" id="welcome"></div>
    <button class="logout" onclick="logout()">Logout</button>
</header>

<div class="container">

    <div class="card" onclick="openFeature('animal')">
        <h3>Animal Detector</h3>
        <button>Open</button>
    </div>

    <div class="card" onclick="openFeature('plant')">
        <h3>Plant Detector</h3>
        <button>Open</button>
    </div>

    <div class="card" onclick="openFeature('treatment')">
        <h3>Treatment</h3>
        <button>Open</button>
    </div>

    <div class="card" onclick="openFeature('blood')">
        <h3>Blood Report Analyzer</h3>
        <button>Open</button>
    </div>

    <div class="card" onclick="openFeature('diet')">
        <h3>Diet Planner</h3>
        <button>Open</button>
    </div>

</div>

<script>

// 🔐 LOGIN CHECK
if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "login.html";
}

// 👤 SHOW USERNAME
let user = localStorage.getItem("user");
document.getElementById("welcome").innerText = "Welcome, " + user;

// 🚀 FEATURE NAVIGATION
function openFeature(feature){

    if(feature === "animal"){
        alert("Animal Detection Page");
    }

    if(feature === "plant"){
        alert("Plant Detection Page");
    }

    if(feature === "treatment"){
        alert("Treatment Page");
    }

    if(feature === "blood"){
        alert("Blood Report Analyzer");
    }

    if(feature === "diet"){
        alert("Diet Planner");
    }
}

// 🔓 LOGOUT
function logout(){
    localStorage.removeItem("loggedIn");
    window.location.href = "login.html";
}

</script>

</body>
</html>
