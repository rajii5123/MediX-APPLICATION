<!DOCTYPE html>
<html>
<head>
<title>AI Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#1f2a36;
    color:white;
}

/* HEADER */
header{
    padding:15px;
    background:#2c3e50;
    text-align:center;
}

/* CARDS */
.row{
    display:flex;
    justify-content:space-around;
    margin:20px;
}

.card{
    background:#2c3e50;
    padding:20px;
    width:22%;
    text-align:center;
    border-radius:10px;
}

.card h2{
    color:#00d4ff;
}

/* SECTION */
.section{
    display:flex;
    margin:20px;
}

/* BOX */
.box{
    background:#2c3e50;
    padding:20px;
    margin:10px;
    flex:1;
    border-radius:10px;
}

/* BUTTON */
button{
    padding:10px;
    margin-top:10px;
    background:#00d4ff;
    border:none;
    color:black;
    border-radius:5px;
    cursor:pointer;
}

/* UPLOAD */
input{
    margin-top:10px;
}
</style>

</head>

<body>

<header>
<h2>AI Health & Agriculture Dashboard</h2>
<p id="welcome"></p>
</header>

<!-- TOP CARDS -->
<div class="row">
    <div class="card">
        <h3>Plant Accuracy</h3>
        <h2>91%</h2>
    </div>

    <div class="card">
        <h3>Animal Accuracy</h3>
        <h2>88%</h2>
    </div>

    <div class="card">
        <h3>Reports Analyzed</h3>
        <h2>315</h2>
    </div>

    <div class="card">
        <h3>User Satisfaction</h3>
        <h2>96%</h2>
    </div>
</div>

<!-- MAIN SECTION -->
<div class="section">

    <!-- DETECTION -->
    <div class="box">
        <h3>Disease Detection</h3>

        <button onclick="setMode('plant')">Plant</button>
        <button onclick="setMode('animal')">Animal</button>

        <br><br>
        <input type="file" id="image" onchange="previewImage()"><br>
        <img id="preview" width="150">

        <br>
        <button onclick="detect()">Detect</button>

        <h3 id="result"></h3>
        <p id="treatment"></p>
    </div>

    <!-- ANALYTICS -->
    <div class="box">
        <h3>System Info</h3>
        <p>✔ AI Model Active</p>
        <p>✔ Cloud Connected</p>
        <p>✔ Reports Stored</p>

        <button onclick="alert('More analytics coming')">View Details</button>
    </div>

</div>

<!-- LOGOUT -->
<div style="text-align:center;">
<button onclick="logout()" style="background:red;color:white;width:200px;">Logout</button>
</div>

<script>

// LOGIN CHECK
if(localStorage.getItem("loggedIn")!=="true"){
    window.location.href="login.html";
}

// USERNAME
document.getElementById("welcome").innerText="Welcome, "+localStorage.getItem("user");

// MODE
let mode="plant";

function setMode(type){
    mode=type;
    alert(type+" selected");
}

// IMAGE PREVIEW
function previewImage(){
    let file=document.getElementById("image").files[0];
    let reader=new FileReader();
    reader.onload=function(){
        document.getElementById("preview").src=reader.result;
    }
    reader.readAsDataURL(file);
}

// DETECT
function detect(){

    if(mode==="plant"){
        let d=["Leaf Spot","Powdery Mildew","Healthy"];
        let t=["Use fungicide","Apply pesticide","No treatment"];

        let i=Math.floor(Math.random()*3);

        document.getElementById("result").innerText="Plant: "+d[i];
        document.getElementById("treatment").innerText="Treatment: "+t[i];
    }

    if(mode==="animal"){
        let d=["Skin Infection","Foot & Mouth","Healthy"];
        let t=["Apply cream","Vaccinate","No treatment"];

        let i=Math.floor(Math.random()*3);

        document.getElementById("result").innerText="Animal: "+d[i];
        document.getElementById("treatment").innerText="Treatment: "+t[i];
    }
}

// LOGOUT
function logout(){
    localStorage.removeItem("loggedIn");
    window.location.href="login.html";
}

</script>

</body>
</html>
