<!DOCTYPE html>
<html>
<head>
<title>AI Dashboard Advanced</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#1f2a36;
    color:white;
}

header{
    padding:15px;
    background:#2c3e50;
    text-align:center;
}

.row{
    display:flex;
    justify-content:space-around;
    margin:20px;
}

.card{
    background:#2c3e50;
    padding:20px;
    width:22%;
    text-align:center;
    border-radius:10px;
}

/* CIRCLE */
.circle{
    width:100px;
    height:100px;
    border-radius:50%;
    background:conic-gradient(#00d4ff 75%, #444 0%);
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
}

.circle span{
    font-size:20px;
}

/* SECTION */
.section{
    display:flex;
    margin:20px;
}

.box{
    background:#2c3e50;
    padding:20px;
    margin:10px;
    flex:1;
    border-radius:10px;
}

button{
    padding:10px;
    margin:10px;
    background:#00d4ff;
    border:none;
    border-radius:5px;
}

</style>

</head>

<body>

<header>
<h2>AI Health & Agriculture Dashboard</h2>
<p id="welcome"></p>
</header>

<!-- PROGRESS CIRCLES -->
<div class="row">

    <div class="card">
        <h3>Health Score</h3>
        <div class="circle"><span>85%</span></div>
    </div>

    <div class="card">
        <h3>Crop Resistance</h3>
        <div class="circle"><span>78%</span></div>
    </div>

    <div class="card">
        <h3>AI Accuracy</h3>
        <div class="circle"><span>92%</span></div>
    </div>

    <div class="card">
        <h3>System Performance</h3>
        <div class="circle"><span>88%</span></div>
    </div>

</div>

<!-- CHARTS -->
<div class="section">

    <!-- BLOOD ANALYSIS -->
    <div class="box">
        <h3>Blood Analysis</h3>
        <canvas id="bloodChart"></canvas>
    </div>

    <!-- PATIENT HEALTH -->
    <div class="box">
        <h3>Patient Health Graph</h3>
        <canvas id="healthChart"></canvas>
    </div>

</div>

<!-- CROP GRAPH -->
<div class="section">
    <div class="box">
        <h3>Crop Resistance Power</h3>
        <canvas id="cropChart"></canvas>
    </div>
</div>

<script>

// LOGIN CHECK
if(localStorage.getItem("loggedIn")!=="true"){
    window.location.href="login.html";
}

// USER
document.getElementById("welcome").innerText="Welcome, "+localStorage.getItem("user");


// BLOOD CHART
new Chart(document.getElementById("bloodChart"),{
    type:"bar",
    data:{
        labels:["RBC","WBC","Platelets"],
        datasets:[{
            label:"Levels",
            data:[4.5, 7.2, 250],
            backgroundColor:["red","blue","green"]
        }]
    }
});


// HEALTH GRAPH
new Chart(document.getElementById("healthChart"),{
    type:"line",
    data:{
        labels:["Day1","Day2","Day3","Day4","Day5"],
        datasets:[{
            label:"Health Score",
            data:[60,70,75,80,85],
            borderColor:"#00d4ff",
            fill:false
        }]
    }
});


// CROP GRAPH
new Chart(document.getElementById("cropChart"),{
    type:"bar",
    data:{
        labels:["Nitrogen","Water","Sunlight","Soil"],
        datasets:[{
            label:"Resistance",
            data:[80,70,90,85],
            backgroundColor:["yellow","blue","orange","green"]
        }]
    }
});

</script>

</body>
</html>

</script>

</body>
</html>
