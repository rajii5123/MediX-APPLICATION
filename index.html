<!DOCTYPE html>
<html>
<head>
    <title>AI Disease Detection Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #e6e6e6;
            margin: 0;
        }

        header {
            background: #0072ff;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px gray;
            cursor: pointer;
        }

        .card:hover {
            background: #f0f8ff;
        }

        button {
            margin-top: 10px;
            padding: 8px;
            background: #0072ff;
            color: white;
            border: none;
            border-radius: 5px;
        }

        .logout {
            position: absolute;
            right: 20px;
            top: 15px;
            background: red;
        }
    </style>
</head>

<body>

<header>
    <h2>AI Health & Agriculture Dashboard</h2>
    <button class="logout" onclick="logout()">Logout</button>
</header>

<div class="container">

    <div class="card" onclick="openFeature('animal')">
        <h3>Animal Detector</h3>
        <p>Detect animal diseases</p>
        <button>Open</button>
    </div>

    <div class="card" onclick="openFeature('plant')">
        <h3>Plant Disease Detector</h3>
        <p>Analyze plant leaf diseases</p>
        <button>Open</button>
    </div>

    <div class="card" onclick="openFeature('treatment')">
        <h3>Treatment</h3>
        <p>Get medicine suggestions</p>
        <button>Open</button>
    </div>

    <div class="card" onclick="openFeature('blood')">
        <h3>Blood Report Analyzer</h3>
        <p>Analyze medical reports</p>
        <button>Open</button>
    </div>

    <div class="card" onclick="openFeature('diet')">
        <h3>Diet Planner</h3>
        <p>Personalized diet suggestions</p>
        <button>Open</button>
    </div>

</div>

<script>

// 🔐 Protect page (login check)
if(!localStorage.getItem("user")){
    window.location.href = "login.html";
}

// 🚀 Feature navigation
function openFeature(feature){

    if(feature === "animal"){
        window.location.href = "animal.html";
    }

    if(feature === "plant"){
        window.location.href = "plant.html";
    }

    if(feature === "treatment"){
        window.location.href = "treatment.html";
    }

    if(feature === "blood"){
        window.location.href = "blood.html";
    }

    if(feature === "diet"){
        window.location.href = "diet.html";
    }
}

// 🔓 Logout
function logout(){
    localStorage.removeItem("user");
    window.location.href = "login.html";
}

</script>

</body>
</html>
