<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{font-family:Arial;background:#e6e6e6;text-align:center;}
.box{background:white;padding:30px;margin:100px auto;width:300px;border-radius:10px;}
input{padding:10px;margin:10px;width:90%;}
button{padding:10px;width:100%;background:green;color:white;border:none;}
</style>
</head>
<body>

<div class="box">
<h2>Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p>New user? <a href="signup.html">Signup</a></p>
<p id="msg"></p>
</div>

<script>
function login(){
    let u=document.getElementById("user").value;
    let p=document.getElementById("pass").value;

    let su=localStorage.getItem("user");
    let sp=localStorage.getItem("pass");

    if(u===su && p===sp){
        localStorage.setItem("loggedIn","true");
        window.location.href="index.html";
    } else {
        document.getElementById("msg").innerText="Invalid Login";
    }
}
</script>

</body>
</html>
